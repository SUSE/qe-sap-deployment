---
# AWS cluster bootstrap wrapper.
# Orchestrates common and AWS-specific tasks for HA cluster setup.

# It assumes that all cloud detection has already been run
- name: Set corosync template path
  ansible.builtin.set_fact:
    corosync_template: "../templates/aws_corosync.conf.j2"

# This collection of tasks bootstraps the cluster following guidance from
# https://docs.aws.amazon.com/sap/latest/sap-hana/sap-hana-on-aws-ha-cluster-configuration-on-sles.html
# AWS-specific: upload credentials to target nodes.
- name: Ensure aws directory exists
  ansible.builtin.file:
    path: /root/.aws
    state: directory
    mode: '0700'

- name: Upload aws files
  ansible.builtin.copy:
    src: "~/.aws/{{ item }}"
    dest: "/root/.aws/{{ item }}"
    owner: root
    group: root
    mode: '0600'
  loop:
    - credentials
    - config

- name: Common cluster initialization
  ansible.builtin.include_tasks: ./cluster-bootstrap-init.yaml

# AWS-specific STONITH configuration using EC2 external agent.
- name: Stonith command
  ansible.builtin.set_fact:
    aws_stonith_cmd: |
      crm configure primitive rsc_aws_stonith stonith:external/ec2 \
      op start interval=0 timeout=180 \
      op stop interval=0 timeout=180 \
      op monitor interval=120 timeout=60 \
      meta target-role=Started \
      params tag={{ aws_stonith_tag }} pcmk_delay_max=15

- name: Configure AWS EC2 STONITH for sle 12sp5
  ansible.builtin.command: "{{ aws_stonith_cmd }}"
  when:
    - is_primary
    - not (use_sbd | default(false) | bool)
    - ansible_distribution_major_version == '12'
  register: stonith_config_result
  changed_when: stonith_config_result.rc == 0
  failed_when: >
    stonith_config_result.stderr_lines | select("match", "ERROR") | reject("match", "ERROR: warning") | list | length > 0

- name: Configure AWS EC2 STONITH for sle 15
  ansible.builtin.command: "{{ aws_stonith_cmd }}"
  when:
    - is_primary
    - not (use_sbd | default(false) | bool)
    - ansible_distribution_major_version != '12'
  register: stonith_config_result
  changed_when: stonith_config_result.rc == 0
  failed_when: "'ERROR' in stonith_config_result.stderr"

# AWS opts in to `stonith-action=off` per the SUSE/AWS reference architecture
# (see cluster-bootstrap-defaults.yaml header for details).
- name: Common cluster defaults
  ansible.builtin.include_tasks:
    file: ./cluster-bootstrap-defaults.yaml
  vars:
    stonith_timeout_native: "600s"
    disable_stonith_action: true
    set_sbd_stonith_timeout: 144

# AWS-specific cluster IP configuration using aws-vpc-move-ip.
- name: Configure cluster IP
  ansible.builtin.command:
    cmd: >-
      crm configure primitive
      rsc_ip_{{ sap_hana_install_sid }}_HDB{{ sap_hana_install_instance_number }}
      ocf:suse:aws-vpc-move-ip params
      ip={{ cluster_ip }}
      routing_table={{ aws_route_table_id }}
      interface=eth0
      profile=default
      op start interval=0 timeout=180
      op stop interval=0 timeout=180
      op monitor interval=60 timeout=60
  register: configure_cluster_ip_result
  changed_when: configure_cluster_ip_result.rc == 0
  when:
    - rsc_ip | length == 0
    - is_primary

- name: Common VIP management
  ansible.builtin.include_tasks: ./cluster-bootstrap-vip.yaml
  vars:
    # On AWS the cluster IP is a standalone primitive (no group wrapper),
    # so the primitive name is the correct target for move/clear.
    vip_resource: "rsc_ip_{{ sap_hana_install_sid }}_HDB{{ sap_hana_install_instance_number }}"
